<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Master QC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="card-main">
            <div class="badge-row">
                <span class="tag">Master Edition</span>
                <button onclick="exportToCSV()" class="btn-sub">Xuất CSV</button>
            </div>
            <div class="balance-container">
                <small>Số dư khả dụng</small>
                <h1 id="balance">0đ</h1>
            </div>
            <div class="stats">
                <div class="stat-box">Thu: <b id="total-income" style="color:#4ade80">+0đ</b></div>
                <div class="stat-box">Chi: <b id="total-expense" style="color:#fb7185">-0đ</b></div>
            </div>
            <div class="progress-container">
                <div class="progress-text">Mục tiêu: <b id="goal-percent">0%</b></div>
                <div class="bar-bg"><div id="goal-bar" class="bar-fill"></div></div>
            </div>
        </header>

        <section class="section-chart">
            <div class="chart-relative">
                <canvas id="expenseChart"></canvas>
                <div class="chart-center">
                    <b id="chart-center-val">0đ</b>
                    <small>Tổng chi</small>
                </div>
            </div>
            <div id="chart-legend" class="legend-list"></div>
        </section>

        <div id="user-filters" class="filter-scroll"></div>
        <div class="search-row">
            <input type="text" id="search" placeholder="Tìm giao dịch..." onkeyup="updateUI()">
            <select id="timeFilter" onchange="updateUI()">
                <option value="month">Tháng này</option>
                <option value="all">Tất cả</option>
            </select>
        </div>

        <main class="history">
            <div id="budget-alert" class="alert-red">⚠️ Bạn đã tiêu quá hạn mức tháng!</div>
            <ul id="list"></ul>
        </main>

        <button class="fab" id="fab-btn" onclick="toggleForm()">+</button>

        <div id="overlay" class="overlay hidden">
            <div class="bottom-sheet">
                <div class="sheet-header">
                    <h3>Thêm giao dịch</h3>
                    <button onclick="toggleForm()" class="btn-close">×</button>
                </div>
                <form id="form">
                    <div class="row">
                        <input type="text" id="text" placeholder="Ghi chú" required>
                        <input type="text" id="user" placeholder="Người chi" required>
                    </div>
                    <div class="row">
                        <input type="date" id="date" required>
                        <select id="type">
                            <option value="expense">Chi tiêu (-)</option>
                            <option value="income">Thu nhập (+)</option>
                        </select>
                    </div>
                    <input type="number" id="amount" inputmode="numeric" placeholder="Số tiền (đ)" required>
                    <button type="submit" id="submit-btn" class="btn-save">Lưu lại</button>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
