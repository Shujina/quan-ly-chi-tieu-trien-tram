<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Infinity</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="dashboard">
            <div class="dash-header">
                <span class="version-tag">Infinity Edition</span>
                <button class="btn-action" onclick="exportToCSV()">📤 Xuất file</button>
            </div>
            
            <div class="balance-section">
                <small>Tổng số dư hiện tại</small>
                <h1 id="balance">0đ</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-item income">
                    <small>Tổng Thu</small>
                    <p id="total-income">+0đ</p>
                </div>
                <div class="stat-item expense">
                    <small>Tổng Chi</small>
                    <p id="total-expense">-0đ</p>
                </div>
            </div>

            <div class="goal-box">
                <div class="goal-text">
                    <span>Mục tiêu tiết kiệm</span>
                    <b id="goal-percent">0%</b>
                </div>
                <div class="progress-track"><div id="goal-bar" class="progress-fill"></div></div>
            </div>
        </header>

        <section class="analysis-section">
            <h3>Phân tích chi tiêu</h3>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
                <div class="chart-inner">
                    <b id="chart-center-val">0đ</b>
                    <small>Tổng chi</small>
                </div>
            </div>
            <div id="chart-legend" class="legend-grid"></div>
        </section>

        <div id="user-filters" class="chips-bar"></div>
        
        <div class="search-bar">
            <input type="text" id="search" placeholder="Tìm tên giao dịch..." onkeyup="updateUI()">
            <select id="timeFilter" onchange="updateUI()">
                <option value="month">Tháng này</option>
                <option value="all">Tất cả</option>
            </select>
        </div>

        <main class="history-section">
            <div id="budget-alert" class="budget-alert">⚠️ Cảnh báo: Đã vượt hạn mức chi tiêu tháng!</div>
            <ul id="list" class="tx-list"></ul>
        </main>

        <button class="fab-btn" onclick="toggleForm()" id="fab">+</button>
        <div id="overlay" class="overlay hidden">
            <form id="form" class="bottom-sheet">
                <div class="sheet-header">
                    <h2>Giao dịch mới</h2>
                    <button type="button" onclick="toggleForm()">✖</button>
                </div>
                <div class="form-grid">
                    <input type="text" id="text" placeholder="Ghi chú (Ví dụ: Ăn sáng)" required>
                    <input type="text" id="user" placeholder="Tên người chi" required>
                    <input type="date" id="date" required
